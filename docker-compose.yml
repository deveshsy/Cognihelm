version: '3.8'

services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000

  console:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    command: uvicorn ee.console:app --host 0.0.0.0 --port 8080
